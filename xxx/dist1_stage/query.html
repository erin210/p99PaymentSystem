    function renderInfo(json) {
      $('#userID').text(json.U_EMAIL);
      const dataNN=json.Transaction_Report.length;
      console.log(dataNN);
      $('#dataNN').text(dataNN);
      

      const historyDATA = json.Transaction_Report; // 這裡就是一頁的資料
      // console.log("收到的資料：", historyDATA);

      // 排序-新到舊
    //   historyDATA.sort((a, b) => new Date(b.CreateTime_at) - new Date(a.CreateTime_at));

      // 清空表格跟列表
      $('#historyTable').empty();
      $('#listArea').empty();

      // === PC table =====================================================
      const tableTH = `<tr class="list_th">
                        <th class="acc_CustomerName">客戶名稱</th>
                        <th class="acc_PAID_NAME">PAID</th>
                        <th class="acc_C_COID">COID</th>
                        <th class="acc_PAY_STATUS">交易狀態</th>
                        <th class="acc_PRODUCT_ID">商品編號</th>
                        <th class="acc_PRODUCT_NAME">商品名稱</th>
                        <th class="acc_USER_ACCTID">ACC</th>
                        <th class="acc_date">交易日期</th>
                        <th class="acc_CUID">CUID</th>
                        <th class="acc_AMOUNT">金額</th>
                    </tr>
                    <tr style="height: 10px;"></tr>`;
      $('#historyTable').append(tableTH);

      historyDATA.forEach(item => {
        const dateFormat = formatTime(item.TransTime);
        // const amountHTML = formatAmount(item.AMOUNT_ADD_USE);


        const tableHTML = `<tr>
                            <td class="acc_CustomerName">${item.CustomerName}</td>
                            <td class="acc_PAID_NAME">${item.PAID_NAME}</td>
                            <td class="acc_C_COID">${item.C_COID}</td>
                            <td class="acc_PAY_STATUS">${item.PAY_STATUS}</td>
                            <td class="acc_PRODUCT_ID">${item.PRODUCT_ID}</td>
                            <td class="acc_PRODUCT_NAME">${item.PRODUCT_NAME}</td>
                            <td class="acc_USER_ACCTID">${item.USER_ACCTID ? item.USER_ACCTID : "-"}</td>
                            <td class="acc_date">${dateFormat}</td>
                            <td class="acc_CUID">${item.CUID}</td>
                            <td class="acc_AMOUNT">${item.AMOUNT}</td>
                        </tr>`;
        $('#historyTable').append(tableHTML);
      });

      // === M list =====================================================
      const groupedData = groupByYearMonth(historyDATA);
      if (Object.keys(groupedData).length === 0) {
        $('.dataEmpty').show();
        $('.pagination').hide();
      } else {
        $('.dataEmpty').hide();
        $('.pagination').show();
      }

      Object.keys(groupedData).forEach(key => {
        const listTitle_HTML = `

                            <ul id="listDATA${key}"></ul>`;
        $('#listArea').append(listTitle_HTML);

        groupedData[key].forEach(item => {
          const amountHTML = item.AMOUNT;
          const dateHTML = formatTime(item.TransTime).substring(5);
          const listINFO_HTML = `<li>
                                <div class="list_head">
                                    <div>
                                        <span class="list_text_left acc_PRODUCT_NAME">${item.PRODUCT_NAME}</span>
                                        <span class="list_text_right">

                                            </i>
                                        </span>
                                    </div>
                                    <div>

                                        <span class="list_text_right acc_AMOUNT">${item.CUID}<b>${amountHTML}</b></span>
                                    </div>
                                </div>
                                <div class="list_content">
                                    <div>
                                        <span class="list_text_left">商品編號</span>
                                        <span class="list_text_right">${item.PRODUCT_ID}</span>
                                    </div>

                                        <span class="list_text_right">${item.CustomerName}</span>
                                    </div>
                                    <div>
                                        <span class="list_text_left">PAID</span>
                                        <span class="list_text_right">${item.PAID_NAME}</span>
                                    </div>
                                    <div>
                                        <span class="list_text_left">COID</span>
                                        <span class="list_text_right">${item.C_COID}</span>
                                    </div>
                                    <div>
                                        <span class="list_text_left">交易狀態</span>
                                        <span class="list_text_right">${item.PAY_STATUS}</span>
                                    </div>
                                    <div>
                                        <span class="list_text_left">ACC</span>
                                        <span class="list_text_right">${item.USER_ACCTID ? item.USER_ACCTID : "-"}</span>
                                    </div>

      $('.list_head').on('click', function() {
        $(this).find('.imgbox').toggleClass('rotate');
        $(this).siblings('.list_content').toggleClass('show');
      });

      //判斷-正數/負數
      function formatAmount(amount) {
        // const this_amount=Number(amount);
        if (amount.charAt(0) !== '-') {
          return `<i class="icon account_add"><img src="./assets/img/icon_account_add.svg" alt=""></i><b>${formatCurrency(Number(amount))}</b>`;
        } else {
          const positive = Number(amount.replace('-', '')); // 去掉負號
          return `<i class="icon account_deduct"><img src="./assets/img/icon_account_deduct.svg" alt=""></i><b>${formatCurrency(positive)}</b>`;
        }
      }

      //日期格式
      function groupByYearMonth(data) {
        const grouped = {};
        data.forEach(item => {
          const [year, month] = item.TransTime.split('-');
          const key = `${year}-${month}`;
          if (!grouped[key]) grouped[key] = [];
          grouped[key].push(item);
        });
        return grouped;
      }
      //日期＋時間 格式
      function formatTime(tt) {
        const [datePart, timePart] = tt.split(" ");
        const timePartFormate = timePart ? timePart.split(".")[0] : "";
        return `<b>${datePart}</b> <b>${timePartFormate}</b>`;
      }
      //千元標註
      function formatCurrency(number) {
        // 確保 number 是一個整數
        if (!Number.isInteger(number)) return null;

        // 將整數轉成字串，並利用正規表達式添加逗號
        return number.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      }

      // 顯示頁碼
      renderPagination(parseInt(json.PAGE_COUNT), parseInt(json.PAGE_SELECT));
      initTranslation(json) //翻譯
    }

    // ===讀取當頁內容===
    function loadPage(page) {
      

      const url = `./history?page=${page}&json=1`;

      fetch(url).then(res => {
          if (!res.ok) throw new Error(res.status);
          return res.text();
        })
        .then(html => {
          //抓JSON格式
          const $temp = $("<div>").html(html);
          const scriptText = $temp.find("script").text();
          const jsonText = scriptText.match(/initFunction\(([\s\S]*)\);/)[1];
          const data = JSON.parse(jsonText);

          $('.history_list').fadeOut(200, function() {
            // 重新解析資料
            renderInfo(data);
            $(this).fadeIn(200);
          });

          // 滾動效果
          $('.scroll_bg').animate({
            scrollTop: 0
          }, 300);
          $('.container').animate({
            scrollTop: 0
          }, 300);

        })

          } else {

          }
        });
    }

    //計算頁碼
    function renderPagination(PAGE_COUNT, PAGE_SELECT) {
      const $pageDiv = $("#page");
      $pageDiv.empty();

      // 如果總頁數小於等於 1，通常隱藏分頁列或不渲染
    if (PAGE_COUNT <= 1) {
        $("#pagination").hide(); 
        return;
    } else {
        $("#pagination").show();
    }

      const MAX_DISPLAY = 5; // 每次顯示的頁碼數量
      let startPage = Math.floor((PAGE_SELECT - 1) / MAX_DISPLAY) * MAX_DISPLAY + 1;
      let endPage = Math.min(startPage + MAX_DISPLAY - 1, PAGE_COUNT);

        // 左箭頭 (#prev) - 跳回上一組的第一頁
        const $prevBtn = $("#prev");
        $prevBtn.prop("disabled", startPage === 1);
        $prevBtn.off("click").on("click", () => {
            if (startPage > 1) {
            let newPage = startPage - 1; // 跳到前一組最後一頁
            loadPage(newPage); 
            }
        });

        // 右箭頭 (#next) - 跳到下一組的第一頁
        const $nextBtn = $("#next");
        $nextBtn.prop("disabled", endPage === PAGE_COUNT);
        $nextBtn.off("click").on("click", () => {
            if (endPage < PAGE_COUNT) {
            let newPage = endPage + 1; // 跳到下一組第一頁
            loadPage(newPage);
            }
        });

      // 中間頁碼 (維持你原本的優秀寫法)
        for (let i = startPage; i <= endPage; i++) {
            const $span = $("<span>").text(i).addClass("pageLink");
            if (i === PAGE_SELECT) $span.addClass("active");
            $span.on("click", () => loadPage(i)); // 點擊數字跳到該頁
            $pageDiv.append($span);
        }
    }
