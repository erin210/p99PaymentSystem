    <script>
       
        
        let pageBaseUrl = '';
        $('.togglePassword').on('click', function () {
            const passwordField = $(this).siblings('input');
            const isPasswordVisible = passwordField.attr('type') === 'text';
            passwordField.attr('type', isPasswordVisible ? 'password' : 'text');

            const newIconSrc = isPasswordVisible ? pageBaseUrl + 'https://stage-backend-page.p99pay.com/assets/img/icon_eye_close.svg' : pageBaseUrl + 'https://stage-backend-page.p99pay.com/assets/img/icon_eye_open.svg';
            $(this).attr('src', newIconSrc);
        });

        function check_submit() {
            
            $.LoadingOverlay("show", {
                image: "",  
                custom: $("<div>", { class: "custom-spinner" })[0],
                background: "rgba(255,255,255,0.8)"

            document.getElementById('form').submit();
            
        }

    </script>
